version: 2

models:
  - name: fact_orders
    description: "Table de faits des commandes"
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: order_status
        tests:
          - not_null
          - accepted_values:
              values: ['delivered', 'shipped', 'canceled', 'processing',
                       'invoiced', 'unavailable', 'approved', 'created']

  - name: dim_customers
    description: "Dimension clients"
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: customer_state
        tests:
          - not_null

  - name: dim_products
    description: "Dimension produits"
    columns:
      - name: product_id
        tests:
          - unique
          - not_null